command_timeout = 1000
"$schema" = 'https://starship.rs/config-schema.json'

# Format tetap mengikuti struktur Anda, ditambahkan sedikit spacing
format = """
$directory\
${custom.giturl}\
$git_branch\
$git_state\
$git_status\
$character\
"""

add_newline = false
palette = 'poimandres'

[directory]
# Menggunakan 'cyan' atau 'brightmint' yang sesuai dengan palette Poimandres
style = "bold fg:cyan" 
format = "[$path ]($style)"
truncation_length = 1
truncate_to_repo = false

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "¾░ØÜ "
"Pictures" = "´Ç¥ "
"Developer" = "¾░▓ï "

[custom.giturl]
# disabled = true
description = "Display symbol for remote Git server"
command = """
GIT_REMOTE=$(command git ls-remote --get-url 2> /dev/null)
if [[ "$GIT_REMOTE" =~ "github" ]]; then
    GIT_REMOTE_SYMBOL="´Éê "
elif [[ "$GIT_REMOTE" =~ "gitlab" ]]; then
    GIT_REMOTE_SYMBOL="´èû "
elif [[ "$GIT_REMOTE" =~ "bitbucket" ]]; then
    GIT_REMOTE_SYMBOL="´à▒ "
elif [[ "$GIT_REMOTE" =~ "git" ]]; then
    GIT_REMOTE_SYMBOL="´×í "
else
    GIT_REMOTE_SYMBOL="´çÆ "
fi
echo "$GIT_REMOTE_SYMBOL "
"""
when = 'git rev-parse --is-inside-work-tree 2> /dev/null'
format = "at $output"

[git_branch]
symbol = "[¯éÂ](black)´Éÿ "
style = "bold fg:blue bg:black" # Biru dingin khas Poimandres
format = "  on [$symbol$branch]($style)[¯é┤ ](black)"

[git_status]
style = "fg:pink" # Menggunakan aksen pink/magenta untuk status
format = "[($all_status$ahead_behind )]($style)"

[nodejs]
symbol = "¯£ÿ"
format = '[ $symbol( $version) ]($style)'

[c]
symbol = "¯ÿ× "
format = '[[ $symbol( $version) ]]($style)'

[rust]
symbol = "¯×¿"
format = '[[ $symbol( $version) ]]($style)'

[golang]
symbol = "¯ÿº"
format = '[ $symbol( $version) ]($style)'
detect_files = ["go.mod"]

[php]
symbol = "¯ÿê"
format = '[[ $symbol( $version) ]]($style)'

[java]
symbol = "¯ëû "
format = '[[ $symbol( $version) ]]($style)'

[kotlin]
symbol = "¯ÿ┤"
format = '[[ $symbol( $version) ]]($style)'

[haskell]
symbol = "¯ÿƒ"
format = '[[ $symbol( $version) ]]($style)'

[python]
symbol = "¯ÿå"
format = '[[ $symbol( $version) ]]($style)'

[docker_context]
symbol = "´îê"
format = '[ $symbol( $context) ]($style)'

[character]
success_symbol = "[´üí](bold green)"
error_symbol = "[´üí](bold red)"

# --- DEFINE PALETTE POIMANDRES ---
# Ini penting agar Starship tahu apa itu warna 'cyan', 'blue', dll di tema ini
[palettes.poimandres]
cyan = "#5de4c7"
blue = "#89ddff"
pink = "#f087bd"
green = "#5de4c7"
red = "#d0679d"
brightmint = "#5de4c7"
